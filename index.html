<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFEITARIA S.A DOCES</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#f7b6c8;
--primary-dark:#e79ab0;
--black:#3a2a2f;
--white:#ffffff;
--background:#fff0f5;
--gray-soft:#ffe4ec;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--background);
color:var(--black);
}

.container{
padding:20px 16px 100px;
max-width:600px;
margin:0 auto;
}

header{
position:sticky;
top:0;
z-index:1000;
background:linear-gradient(135deg,#f7b6c8,#f3a6bc);
text-align:center;
padding:15px 0 10px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.banner-ovo{
width:90px;
margin:auto;
display:block;
}

.header-title{
font-size:20px;
font-weight:700;
letter-spacing:1px;
margin-top:6px;
}

.header-text{
font-size:13px;
font-weight:500;
}

h3{
margin:10px 0 20px;
font-size:20px;
font-weight:600;
}

.card{
background:var(--white);
padding:16px;
margin-bottom:14px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,.05);
transition:.25s;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 8px 22px rgba(0,0,0,.08);
}

.flex{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
}

.circle{
width:60px;
height:60px;
border-radius:12px;
overflow:hidden;
flex-shrink:0;
}

.circle img{
width:100%;
height:100%;
object-fit:cover;
}

button{
border:none;
border-radius:12px;
font-family:'Poppins',sans-serif;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.primary{
background:var(--primary);
color:var(--black);
height:44px;
padding:0 16px;
width:100%;
}

.primary:hover{background:var(--primary-dark);}
.primary:active{transform:scale(.98);}

.small{
width:auto;
height:36px;
padding:0 14px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0 14px;
border-radius:12px;
border:1px solid #f2c5d2;
font-family:'Poppins',sans-serif;
}

.hidden{display:none;}

#cartBtn{
position:fixed;
bottom:24px;
right:20px;
width:64px;
height:64px;
border-radius:50%;
background:var(--primary);
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
cursor:pointer;
}

#cartCount{
position:absolute;
top:-6px;
right:-6px;
background:#ff3b7f;
color:white;
width:24px;
height:24px;
border-radius:50%;
font-size:12px;
display:flex;
justify-content:center;
align-items:center;
}

.toast{
position:fixed;
bottom:110px;
left:50%;
transform:translateX(-50%);
background:#ff3b7f;
color:white;
padding:12px 22px;
border-radius:30px;
font-size:14px;
display:none;
}

</style>
</head>

<body>

<header>

<img class="banner-ovo" src="https://cdn-icons-png.flaticon.com/512/685/685352.png">

<div class="header-title">CONFEITARIA S.A DOCES</div>

<div class="header-text">Doces artesanais • Bolos • Ovos de Páscoa</div>

</header>

<div class="container" id="app"></div>

<div id="cartBtn" onclick="goCart()">
🛒
<div id="cartCount">0</div>
</div>

<div class="toast" id="toast">Item adicionado</div>

<script>

const TAXA=7;

let cart=[];
let viewStack=[];
let dadosPedido={};

function navigate(fn){
viewStack.push(fn);
history.pushState({}, "");
fn();
}

window.addEventListener("popstate",function(){
if(viewStack.length>1){
viewStack.pop();
let last=viewStack[viewStack.length-1];
last();
}else{
history.pushState({}, "");
}
});

const produtos={

Doces:[
{name:"Brigadeiro Gourmet",price:4,descricao:"Brigadeiro artesanal",img:"https://source.unsplash.com/300x300/?brigadeiro"},
{name:"Beijinho",price:4,descricao:"Doce de coco",img:"https://source.unsplash.com/300x300/?coconut-candy"},
{name:"Pudim",price:6,descricao:"Pudim cremoso",img:"https://source.unsplash.com/300x300/?pudding"},
{name:"Mousse Chocolate",price:6,descricao:"Mousse aerado",img:"https://source.unsplash.com/300x300/?chocolate-mousse"},
{name:"Torta Limão",price:7,descricao:"Torta artesanal",img:"https://source.unsplash.com/300x300/?lemon-pie"},
{name:"Geladinho Gourmet",price:5,descricao:"Geladinho premium",img:"https://source.unsplash.com/300x300/?popsicle"},
{name:"Brownie",price:7,descricao:"Brownie chocolate",img:"https://source.unsplash.com/300x300/?brownie"}
],

Bolos:[
{name:"Bolo Chocolate",price:25,descricao:"Bolo recheado",img:"https://source.unsplash.com/300x300/?chocolate-cake"},
{name:"Bolo Cenoura",price:22,descricao:"Cenoura com chocolate",img:"https://source.unsplash.com/300x300/?carrot-cake"},
{name:"Bolo Red Velvet",price:28,descricao:"Bolo premium",img:"https://source.unsplash.com/300x300/?red-velvet-cake"},
{name:"Bolo Morango",price:26,descricao:"Morango com creme",img:"https://source.unsplash.com/300x300/?strawberry-cake"},
{name:"Bolo Ninho",price:27,descricao:"Leite ninho",img:"https://source.unsplash.com/300x300/?milk-cake"},
{name:"Bolo Prestigio",price:27,descricao:"Chocolate com coco",img:"https://source.unsplash.com/300x300/?coconut-cake"},
{name:"Bolo Caseiro",price:20,descricao:"Tradicional",img:"https://source.unsplash.com/300x300/?homemade-cake"}
],

"Ovos de Páscoa Recheados":[
{name:"Ovo Ninho Nutella",price:55,descricao:"Recheio cremoso",img:"https://source.unsplash.com/300x300/?easter-egg"},
{name:"Ovo Brigadeiro",price:50,descricao:"Brigadeiro gourmet",img:"https://source.unsplash.com/300x300/?chocolate-egg"},
{name:"Ovo Ferrero",price:60,descricao:"Chocolate premium",img:"https://source.unsplash.com/300x300/?easter-chocolate"},
{name:"Ovo Kinder",price:58,descricao:"Estilo kinder",img:"https://source.unsplash.com/300x300/?easter-egg-chocolate"},
{name:"Ovo Oreo",price:55,descricao:"Recheio oreo",img:"https://source.unsplash.com/300x300/?oreo-dessert"},
{name:"Ovo Prestigio",price:54,descricao:"Coco e chocolate",img:"https://source.unsplash.com/300x300/?coconut-chocolate"},
{name:"Ovo Brownie",price:56,descricao:"Recheio brownie",img:"https://source.unsplash.com/300x300/?brownie-dessert"}
]

};

function renderHome(){

let html="<h3>Categorias</h3>";

for(let cat in produtos){
html+=`<div class="card" onclick="navigate(()=>openCat('${cat}'))"><b>${cat}</b></div>`;
}

document.getElementById("app").innerHTML=html;

}

function openCat(cat){

let html=`<button onclick="history.back()">⬅ Voltar</button><h3>${cat}</h3>`;

produtos[cat].forEach((p,i)=>{

html+=`<div class="card">
<div class="flex">
<div class="flex">
<div class="circle"><img src="${p.img}"></div>
<div><b>${p.name}</b><br>${p.descricao}<br>R$ ${p.price.toFixed(2)}</div>
</div>
<button class="primary small" onclick="add('${cat}',${i})">Adicionar</button>
</div></div>`;

});

document.getElementById("app").innerHTML=html;

}

function add(cat,i){

let item=produtos[cat][i];

let f=cart.find(x=>x.name==item.name);

if(f){f.qty++}else{cart.push({...item,qty:1})}

updateCart();

toast();

}

function removeFromCart(index){

cart.splice(index,1);

updateCart();

renderCart();

}

function updateCart(){

document.getElementById("cartCount").innerText=cart.reduce((s,i)=>s+i.qty,0);

}

function toast(){

let t=document.getElementById("toast");

t.style.display="block";

setTimeout(()=>t.style.display="none",1500);

}

function goCart(){navigate(renderCart);}

function renderCart(){

let html="<button onclick='history.back()'>⬅ Voltar</button><h3>Carrinho</h3>";

let subtotal=0;

cart.forEach((i,index)=>{

subtotal+=i.price*i.qty;

html+=`<div class="card flex"><div>${i.qty}x ${i.name}</div><div>R$ ${(i.price*i.qty).toFixed(2)}</div><button onclick="removeFromCart(${index})">❌</button></div>`;

});

html+=`<h4>Subtotal: R$ ${subtotal.toFixed(2)}</h4><button class="primary" onclick="navigate(renderCheckout)">Continuar</button>`;

document.getElementById("app").innerHTML=html;

}

function renderCheckout(){

let html=`<button onclick="history.back()">⬅ Voltar</button><h3>Dados do Pedido</h3>

<input id="nome" placeholder="Seu nome" required>

<input id="fone" placeholder="Telefone" required>

<label>Tipo:</label>

<select id="tipo" onchange="toggleEndereco()">

<option value="Entrega">Entrega (+7)</option>

<option value="Retirada">Retirada</option>

</select>

<div id="enderecoBox"><input id="endereco" placeholder="Endereço de entrega"></div>

<label>Quando?</label>

<select id="quando" onchange="toggleData()">

<option value="Agora">Agora</option>

<option value="Agendar">Agendar</option>

</select>

<div id="dataBox" class="hidden"><input type="datetime-local" id="data"></div>

<label>Pagamento:</label>

<select id="pag" onchange="toggleTroco()">

<option>Pix</option>

<option>Dinheiro</option>

<option>Cartão</option>

</select>

<div id="trocoBox" class="hidden"><input id="troco" placeholder="Troco para quanto?"></div>

<button class="primary" onclick="revisao()">Revisar Pedido</button>`;

document.getElementById("app").innerHTML=html;

}

function toggleData(){document.getElementById("dataBox").classList.toggle("hidden",document.getElementById("quando").value!="Agendar");}

function toggleEndereco(){document.getElementById("enderecoBox").classList.toggle("hidden",document.getElementById("tipo").value!="Entrega");}

function toggleTroco(){document.getElementById("trocoBox").classList.toggle("hidden",document.getElementById("pag").value!="Dinheiro");}

function revisao(){

dadosPedido={
nome:document.getElementById("nome").value,
fone:document.getElementById("fone").value,
tipo:document.getElementById("tipo").value,
endereco:document.getElementById("endereco").value,
pag:document.getElementById("pag").value,
troco:document.getElementById("troco").value,
quando:document.getElementById("quando").value,
data:document.getElementById("data").value
};

navigate(renderRevisao);

}

function renderRevisao(){

let subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);

let total=dadosPedido.tipo=="Entrega"?subtotal+TAXA:subtotal;

let html="<button onclick='history.back()'>⬅ Voltar</button><h3>Confirmar Pedido</h3>";

html+=`<b>Cliente:</b> ${dadosPedido.nome}<br>`;
html+=`<b>Telefone:</b> ${dadosPedido.fone}<br>`;
html+=`<b>Tipo:</b> ${dadosPedido.tipo}<br>`;

if(dadosPedido.tipo=="Entrega"){
html+=`<b>Endereço:</b> ${dadosPedido.endereco}<br>`;
}

if(dadosPedido.quando=="Agendar"){
html+=`<b>Agendado para:</b> ${dadosPedido.data}<br>`;
}

html+="<hr>";

cart.forEach(i=>{
html+=`<div>${i.qty}x ${i.name}</div>`;
});

html+=`<hr>
Subtotal: R$ ${subtotal.toFixed(2)}<br>
Total: R$ ${total.toFixed(2)}<br>
Pagamento: ${dadosPedido.pag}<br>

<button class="primary" onclick="finalizar()">Confirmar e Enviar</button>
`;

document.getElementById("app").innerHTML=html;

}

function finalizar(){

let subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);

let total=dadosPedido.tipo=="Entrega"?subtotal+TAXA:subtotal;

let msg="*Pedido - CONFEITARIA S.A DOCES*%0A%0A";

msg+=`👤 Nome: ${dadosPedido.nome}%0A`;
msg+=`📞 Telefone: ${dadosPedido.fone}%0A`;
msg+=`📦 Tipo: ${dadosPedido.tipo}%0A`;

if(dadosPedido.tipo=="Entrega"){
msg+=`🏠 Endereço: ${dadosPedido.endereco}%0A`;
}

if(dadosPedido.quando=="Agendar"){
msg+=`⏰ Agendado para: ${dadosPedido.data}%0A`;
}

msg+="%0A🛒 Itens:%0A";

cart.forEach(i=>{
msg+=`${i.qty}x ${i.name}%0A`;
});

msg+=`%0A💰 Total: R$${total.toFixed(2)}%0A`;
msg+=`💳 Pagamento: ${dadosPedido.pag}%0A`;

if(dadosPedido.pag=="Dinheiro" && dadosPedido.troco){
msg+=`💵 Troco para: ${dadosPedido.troco}%0A`;
}

window.open(`https://wa.me/5511952282056?text=${msg}`);

}

navigate(renderHome);

</script>

</body>

</html>
